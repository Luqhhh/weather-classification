# MobileNetV3-Small configuration

model:
  name: "mobilenetv3_small"
  pretrained: true
  dropout: 0.3

data:
  image_size: 224

training:
  batch_size: 128         # Smaller model → larger batch possible
  epochs: 60
  optimizer:
    name: "adamw"
    lr: 0.001              # Higher LR for lightweight model
    weight_decay: 0.0001
  scheduler:
    name: "cosine"
    warmup_epochs: 3
    min_lr: 0.000001

# Expected characteristics:
#   Params: ~2.5M
#   Weight size: ~10 MB
#   CPU latency (224x224): ~5-10ms
#   Fastest option for CPU inference
