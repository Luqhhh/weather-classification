# ResNet-50 configuration

model:
  name: "resnet50"
  pretrained: true
  dropout: 0.3

training:
  batch_size: 64
  epochs: 50
  optimizer:
    name: "adamw"
    lr: 0.0001
    weight_decay: 0.0001
  scheduler:
    name: "cosine"
    warmup_epochs: 3
    min_lr: 0.000001

# Expected characteristics:
#   Params: ~25.6M
#   Weight size: ~97 MB
#   CPU latency (224x224): ~30-45ms
