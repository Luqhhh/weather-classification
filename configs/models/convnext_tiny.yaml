# ConvNeXt-Tiny configuration

model:
  name: "convnext_tiny"
  pretrained: true
  dropout: 0.3

data:
  image_size: 224

training:
  batch_size: 48          # Smaller batch — larger model
  epochs: 50
  optimizer:
    name: "adamw"
    lr: 0.0001
    weight_decay: 5e-2    # Higher weight decay for ConvNeXt
  scheduler:
    name: "cosine"
    warmup_epochs: 3
    min_lr: 0.000001

# Expected characteristics:
#   Params: ~28.6M
#   Weight size: ~110 MB
#   CPU latency (224x224): ~60-100ms
#   Potentially higher accuracy, but CPU speed must be tested
