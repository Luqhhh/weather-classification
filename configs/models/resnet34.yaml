# ResNet34 configuration

model:
  name: "resnet34"
  pretrained: true
  dropout: 0.3

training:
  batch_size: 64
  epochs: 50
  optimizer:
    name: "adamw"
    lr: 1e-4
    weight_decay: 1e-4
  scheduler:
    name: "cosine"
    warmup_epochs: 3
    min_lr: 1e-6

# Expected characteristics:
#   Params: ~21.8M
#   Weight size: ~83 MB
#   CPU latency (224x224): ~30-45ms
