data:
  augmentation:
    color_jitter:
      brightness: 0.0
      contrast: 0.0
      hue: 0.0
      saturation: 0.0
    cutmix_alpha: null
    mixup_alpha: null
    rand_augment: null
    random_horizontal_flip:
      prob: 0.0
    random_resized_crop:
      ratio:
      - 0.9
      - 1.1
      scale:
      - 1.0
      - 1.0
    random_rotation:
      degrees: 0
  image_size: 224
  mean:
  - 0.485
  - 0.456
  - 0.406
  multiprocessing_context: spawn
  num_workers: 1
  pin_memory: false
  std:
  - 0.229
  - 0.224
  - 0.225
  test_dir: data/test
  train_dir: data/train
  val_dir: data/val
  val_split: 0.2
inference:
  batch_size: 32
  device: cpu
  fp16: false
  num_workers: 2
  use_onnx: false
logging:
  experiment_name: null
  log_dir: outputs
  log_interval: 10
  tensorboard: true
  wandb: false
model:
  dropout: 0.3
  freeze_backbone: false
  name: resnet18
  num_classes: 4
  pretrained: true
seed: 42
training:
  batch_size: 64
  checkpoint:
    mode: max
    monitor: val_macro_f1
    save_top_k: 3
  early_stopping:
    min_delta: 0.001
    patience: 10
  epochs: 50
  loss:
    label_smoothing: 0.1
    name: label_smoothing
  optimizer:
    lr: 0.0001
    name: adamw
    weight_decay: 0.0001
  scheduler:
    min_lr: 1.0e-06
    name: cosine
    step_gamma: 0.1
    step_size: 15
    warmup_epochs: 3
