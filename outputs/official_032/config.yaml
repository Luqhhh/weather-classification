data:
  augmentation:
    color_jitter:
      brightness: 0.08
      contrast: 0.08
      hue: 0.03
      saturation: 0.08
    cutmix_alpha: null
    mixup_alpha: null
    rand_augment: null
    random_horizontal_flip:
      prob: 0.5
    random_resized_crop:
      ratio:
      - 0.9
      - 1.1
      scale:
      - 0.85
      - 1.0
    random_rotation:
      degrees: 0
  holdout_dir: data/holdout
  holdout_split: 0.15
  image_size: 224
  mean:
  - 0.485
  - 0.456
  - 0.406
  multiprocessing_context: null
  num_workers: 0
  pin_memory: false
  std:
  - 0.229
  - 0.224
  - 0.225
  test_dir: data/test
  train_dir: data/train_val
  val_dir: null
  val_split: 0.15
inference:
  batch_size: 32
  device: cpu
  fp16: false
  num_workers: 2
  use_onnx: false
logging:
  experiment_name: official_032
  log_dir: outputs
  log_interval: 10
  tensorboard: true
  wandb: false
model:
  dropout: 0.3
  freeze_backbone: false
  init_weights: outputs/exp_044/best_model.pth
  name: convnext_tiny
  num_classes: 4
  pretrained: true
seed: 42
training:
  batch_size: 32
  checkpoint:
    mode: max
    monitor: val_macro_f1
    save_top_k: 3
  early_stopping:
    min_delta: 0.001
    patience: 100
  ema:
    decay: 0.999
    enabled: true
  epochs: 35
  loss:
    label_smoothing: 0.0
    name: cross_entropy
  optimizer:
    lr: 3.0e-05
    name: adamw
    weight_decay: 0.05
  sampler:
    name: none
  scheduler:
    min_lr: 1.0e-06
    name: cosine
    step_gamma: 0.1
    step_size: 15
    warmup_epochs: 3
